<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fivi's Kitchen — Virome City</title>
<style>
 :root{ --paper:#FBF9F4; --ink:#20201C; --muted:#6E6C63; --line:#E4E1D8; --surface:#FFFFFF; --accent:#0F6E56; --pink:#FBEAF0; --pinkink:#72243E;
   --sans:"Spline Sans",ui-sans-serif,system-ui,sans-serif; --display:"Fraunces",Georgia,serif; --mono:ui-monospace,monospace; }
 @media (prefers-color-scheme: dark){ :root{ --paper:#17181A; --ink:#ECEAE3; --muted:#9B998F; --line:#33342F; --surface:#1F2022; --accent:#3FB08C; --pink:#3A2430; --pinkink:#F3C9D8; } }
 *{box-sizing:border-box}
 body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55;display:flex;justify-content:center;padding:26px 18px;min-height:100vh}
 .doc{width:100%;max-width:580px}
 img{display:block}
 .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);text-align:center;margin:0 0 6px}
 h1{font-family:var(--display);font-weight:600;font-size:34px;margin:0 0 6px;text-align:center;letter-spacing:-.01em}
 .dek{font-size:14px;color:var(--muted);text-align:center;margin:0 auto 20px;max-width:440px}
 .card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:24px 22px;box-shadow:0 3px 14px rgba(0,0,0,.05)}
 /* hero */
 .hero{width:100%;border-radius:20px;border:1px solid var(--line);margin-bottom:16px;box-shadow:0 3px 14px rgba(0,0,0,.06)}
 .btn{font-family:var(--sans);font-size:15px;font-weight:600;padding:13px 26px;border-radius:12px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;transition:transform .1s, opacity .15s}
 .btn:hover{opacity:.92}.btn:active{transform:scale(.98)}
 .btn.ghost{background:var(--surface);color:var(--ink);border-color:var(--line)}
 .btn:disabled{opacity:.4;cursor:not-allowed}
 .center{text-align:center}
 /* progress + question */
 .prog{display:flex;gap:6px;margin-bottom:16px}
 .prog i{flex:1;height:5px;border-radius:999px;background:var(--line);transition:background .3s}
 .prog i.on{background:var(--accent)}
 .step-tag{font-family:var(--mono);font-size:11px;color:var(--muted);margin:0 0 4px}
 .q{font-family:var(--display);font-size:21px;font-weight:600;margin:0 0 15px}
 .opts{display:grid;gap:10px;margin-bottom:14px}
 .opt{text-align:left;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:11px}
 .opt .emoji{font-size:19px}
 .opt:hover{border-color:var(--accent)}
 .opt.sel{border-color:var(--accent);background:rgba(15,110,86,.09);font-weight:600}
 /* Fivi speech bubble */
 .bubble{display:flex;gap:12px;align-items:center;background:var(--pink);border-radius:14px;padding:11px 14px;margin:6px 0 16px;opacity:0;transform:translateY(6px);transition:opacity .25s, transform .25s}
 .bubble.show{opacity:1;transform:none}
 .bubble img{width:52px;height:auto;flex:0 0 auto}
 .bubble p{margin:0;font-size:13.5px;line-height:1.45;color:var(--pinkink)}
 .bubble .name{font-weight:700}
 .nav{display:flex;justify-content:space-between;gap:10px;margin-top:4px}
 /* cooking */
 .cooking{text-align:center;padding:14px 0 18px}
 .cooking img{width:190px;height:auto;margin:0 auto 4px;animation:bob 1.1s ease-in-out infinite}
 @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-7px) rotate(2deg)}}
 .steam{font-size:22px;letter-spacing:6px;animation:pulse 1.3s ease-in-out infinite;color:var(--muted)}
 @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
 .cook-msg{font-family:var(--display);font-size:18px;margin-top:6px}
 /* recipe */
 .recipe-head{display:flex;align-items:center;gap:14px;margin-bottom:4px}
 .recipe-head img{width:86px;height:auto;flex:0 0 auto}
 .recipe-head h2{font-family:var(--display);font-size:24px;margin:0}
 .recipe-meta{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:0 0 14px}
 .recipe{list-style:none;margin:0;padding:0;display:grid;gap:10px}
 .recipe li{display:flex;gap:11px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px}
 .recipe .k{font-family:var(--mono);font-size:10.5px;color:var(--accent);flex:0 0 70px;padding-top:2px;text-transform:uppercase;font-weight:700}
 .recipe li.warn{background:#FFF4E0;border-color:#E4B062}
 .recipe li.warn .k{color:#B77413}
 @media(prefers-color-scheme:dark){.recipe li.warn{background:#3A2E18;border-color:#7A5A22}}
 .foot{margin-top:12px;font-size:11.5px;color:var(--muted);text-align:center;border-top:1px solid var(--line);padding-top:10px}

 .opts.grid2{grid-template-columns:1fr 1fr;gap:9px}
 .opts.grid2 .opt{flex-direction:column;align-items:center;text-align:center;gap:5px;padding:12px 8px}
 .opts.grid2 .opt .emoji{font-size:26px;line-height:1.1}
 .opts.grid2 .opt .nm{font-size:13px;line-height:1.25}
 .opts.grid2 .opt .bm{font-family:var(--mono);font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
 .opt.sel .bm{color:var(--accent)}
</style></head><body>
<div class="doc" id="app"></div>
<script>
const IMG = "../assets/img/";   // this file lives in docs/kitchen/, images in docs/assets/img/

const steps=[
 { key:"sample", tag:"Ingredient 1 of 3", q:"What's in your basket? (the sample)", grid:true,
   opts:[["gut","🧫","Gut / stool","very high biomass"],
         ["oral","👄","Oral / saliva","high biomass"],
         ["throat","🗣️","Upper airway","high biomass"],
         ["vaginal","🌸","Vaginal tract","high biomass"],
         ["milk","🍼","Breast milk","medium biomass"],
         ["skin","🧴","Skin swab","low-med biomass"],
         ["blood","🩸","Blood / plasma","very low biomass"],
         ["urine","💧","Urine","very low biomass"],
         ["lung","🫁","Lung","very low biomass"],
         ["brain","🧠","Brain / CSF","very low biomass"]],
   react:{gut:["fivi-happy","Stool — my favourite pantry! Packed with phages, and viruses are actually findable here."],
          oral:["fivi-happy","Saliva — busy and bacteria-rich. Plenty to work with."],
          throat:["fivi-thinking","Upper airway — high biomass, but the virus still hides behind the bacteria."],
          vaginal:["fivi-happy","Vaginal tract — decent viral fraction and clean-ish. A friendly dish."],
          milk:["fivi-thinking","Milk — middling biomass. We'll need a gentle hand."],
          skin:["fivi-nervous","Skin — sparse pickings and contamination everywhere. Clean controls will matter."],
          blood:["fivi-nervous","Blood… very low biomass and almost all host. We'll cook very gently."],
          urine:["fivi-nervous","Urine — thin soup. Barely anything to work with."],
          lung:["fivi-nervous","Lung — very low biomass and heavy contamination risk. Careful."],
          brain:["fivi-surprised","Brain / CSF?! The hardest kitchen there is — nearly no biomass, huge contamination risk."]} },
 { key:"target", tag:"Ingredient 2 of 3", q:"What are we cooking for? (the target)",
   opts:[["one","🎯","One known virus — is it there or not?"],["phage","🦠","Bacteriophages"],["euk","🧬","Eukaryotic (human) viruses"],["all","🌍","Everything (total virome)"]],
   react:{one:["fivi-surprised","Just one virus, present or absent? Then don't cook the whole banquet — PCR is far cheaper, and more sensitive."],
          phage:["fivi-happy","Phage hunting — mostly dsDNA. My kind of recipe."],
          euk:["fivi-thinking","Eukaryotic viruses — many carry RNA. We'll need a trick for that."],
          all:["fivi-surprised","Everything?! Ambitious. We'll cast the widest net."]} },
 { key:"level", tag:"Ingredient 3 of 3", q:"How's your kitchen experience?",
   opts:[["beg","🐣","Just starting out"],["exp","👩‍🔬","Experienced"]],
   react:{beg:["fivi-happy","New to the kitchen? I'll keep the recipe simple and safe."],
          exp:["fivi-chef","A seasoned cook — let's reach for the fancy tools."]} },
];
const cookSteps=[
  ["fivi-chopping","Fivi is chopping the metadata…"],
  ["fivi-seasoning","Seasoning the protocol…"],
  ["fivi-baking","Almost out of the oven…"],
];
let step=-1;
const ans={sample:null,target:null,level:null};
const app=document.getElementById("app");

function render(){
 if(step===-1) return intro();
 if(step<steps.length) return question();
 if(step===steps.length) return cooking();
 return recipe();
}
function intro(){
 app.innerHTML=`
  <img class="hero" src="${IMG}fivi-kitchen-hero.png" alt="Fivi the bacteriophage cooking in her kitchen">
  <p class="eyebrow">Virome City</p>
  <h1>Fivi's Kitchen</h1>
  <p class="dek">Tell me about your sample and I'll cook you a virome recipe — the methods, in the right order, for your exact case.</p>
  <div class="center"><button class="btn" id="start">Start cooking →</button></div>`;
 document.getElementById("start").onclick=()=>{step=0;render();};
}
function question(){
 const c=steps[step]; const chosen=ans[c.key]; const rc=chosen?c.react[chosen]:null;
 app.innerHTML=`
  <div class="card">
   <div class="prog">${steps.map((_,i)=>`<i class="${i<=step?'on':''}"></i>`).join("")}</div>
   <p class="step-tag">${c.tag}</p>
   <p class="q">${c.q}</p>
   <div class="opts${c.grid?' grid2':''}">${c.opts.map(o=>c.grid
      ? `<button class="opt ${chosen===o[0]?'sel':''}" data-v="${o[0]}"><span class="emoji">${o[1]}</span><span class="nm">${o[2]}</span><span class="bm">${o[3]}</span></button>`
      : `<button class="opt ${chosen===o[0]?'sel':''}" data-v="${o[0]}"><span class="emoji">${o[1]}</span>${o[2]}</button>`).join("")}</div>
   <div class="bubble ${chosen?'show':''}" id="bubble">
     <img id="bav" src="${IMG}${rc?rc[0]:'fivi-thinking'}.png" alt="Fivi">
     <p><span class="name">Fivi:</span> <span id="btext">${rc?rc[1]:''}</span></p>
   </div>
   <div class="nav">
     <button class="btn ghost" id="back">← Back</button>
     <button class="btn" id="next" ${chosen?'':'disabled'}>${step===steps.length-1?'Cook it! 🍳':'Next →'}</button>
   </div>
  </div>`;
 app.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
   const v=b.dataset.v; ans[c.key]=v; const r=c.react[v];
   document.getElementById("btext").textContent=r[1];
   document.getElementById("bav").src=IMG+r[0]+".png";
   document.getElementById("bubble").classList.add("show");
   app.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel")); b.classList.add("sel");
   document.getElementById("next").disabled=false;
 });
 document.getElementById("back").onclick=()=>{step--;render();};
 document.getElementById("next").onclick=()=>{step++;render();};
}
function cooking(){
 let i=0;
 const draw=()=>{
   app.innerHTML=`
    <div class="card cooking">
     <img src="${IMG}${cookSteps[i][0]}.png" alt="Fivi cooking">
     <div class="steam">≈ ≈ ≈</div>
     <p class="cook-msg">${cookSteps[i][1]}</p>
    </div>`;
 };
 draw();
 const iv=setInterval(()=>{ i++; if(i<cookSteps.length) draw(); },900);
 // NOTE: this fixed delay is where the AI API call will go later.
 setTimeout(()=>{ clearInterval(iv); step++; render(); }, 2700);
}
const SITES={
  gut:{name:"gut / stool",bm:1.0,host:0.05,ct:0.12,bmT:"very high",hostT:"<1%",ctT:"low"},
  oral:{name:"oral / saliva",bm:0.85,host:0.2,ct:0.4,bmT:"high",hostT:"5-20%",ctT:"medium"},
  throat:{name:"upper airway",bm:0.8,host:0.3,ct:0.45,bmT:"high",hostT:"low-med",ctT:"medium"},
  vaginal:{name:"vaginal tract",bm:0.85,host:0.35,ct:0.35,bmT:"high",hostT:"low-med",ctT:"low-med"},
  milk:{name:"breast milk",bm:0.5,host:0.45,ct:0.5,bmT:"medium",hostT:"medium",ctT:"medium"},
  skin:{name:"skin",bm:0.4,host:0.5,ct:0.72,bmT:"low-med",hostT:"20-50%",ctT:"high"},
  blood:{name:"blood / plasma",bm:0.1,host:0.9,ct:0.78,bmT:"very low",hostT:"80-95%",ctT:"high"},
  urine:{name:"urine",bm:0.12,host:0.6,ct:0.6,bmT:"very low",hostT:"med-high",ctT:"med-high"},
  lung:{name:"lung",bm:0.08,host:0.9,ct:0.92,bmT:"very low",hostT:"very high",ctT:"very high"},
  brain:{name:"brain / CSF",bm:0.05,host:0.88,ct:0.97,bmT:"very low",hostT:"very high",ctT:"very high"},
};
const TARGETS={one:"one known virus",phage:"bacteriophages",euk:"eukaryotic viruses",all:"the whole virome"};
const LEVELS={beg:"beginner",exp:"experienced"};

function recipe(){
 const {sample,target,level}=ans;
 const S=SITES[sample];
 const r=[];

 // ---- Targeted branch: you already know what you're looking for ----
 if(target==="one"){
   r.push(["Skip it","You don't need metagenomics. Sequencing everything to find one known virus is the expensive way to answer a cheap question.",false]);
   r.push(["Method", level==="beg"
     ? "qPCR (or RT-qPCR if your virus has an RNA genome). Orders of magnitude cheaper than shotgun, and far more sensitive for a known target."
     : "qPCR / RT-qPCR for presence-absence; ddPCR if you need absolute quantification at low copy number.",false]);
   r.push(["Catch","This only works if you already have the sequence and validated primers — and a strain that diverges at the primer site will read as a false negative. If discovery matters, you're back to metagenomics.",true]);
   if(S.ct>=0.6)
     r.push(["Controls",`Contamination risk here is ${S.ctT}, and PCR is sensitive enough to amplify a contaminant into a confident false positive. Run no-template controls, extraction blanks, and a positive control every time.`,true]);
   else
     r.push(["Controls","Run no-template controls, extraction blanks, and a positive control. PCR is sensitive enough that a contaminant reads as a real hit.",false]);
   r.push(["Extraction",`Biomass here is ${S.bmT} — that still shapes your extraction and input volume, even though you're skipping VLP prep entirely (PCR is already specific; filtering would only lose you material).`,false]);
   r.push(["If you need more","Want the strain, or many known viruses at once? A targeted capture panel or amplicon sequencing sits between PCR and full shotgun — cheaper than metagenomics, richer than a Ct value.",false]);
   return draw(S,target,level,r);
 }

 r.push(["Base","Shotgun metagenomics — sequence everything, then sort out what's viral afterwards.",false]);

 if(target==="euk"||target==="all")
   r.push(["Convert","Add reverse transcription (RT) so RNA-genome viruses are captured, not just DNA ones.",false]);
 else
   r.push(["Convert","Phages are mostly dsDNA — no RT needed. Skip it and save the step.",false]);

 // Enrichment decided by the site's real biomass
 if(S.bm>=0.7)
   r.push(["Enrich",`Biomass is ${S.bmT} — VLP prep works well here. Filter (0.22 µm) + nuclease to raise the viral fraction before sequencing.`,false]);
 else if(S.bm>=0.4)
   r.push(["Enrich",`Biomass is ${S.bmT} — VLP prep is possible, but gentle. Expect losses; run an unfiltered total-metagenomics arm alongside if you can.`,true]);
 else
   r.push(["Enrich",`Biomass is ${S.bmT} — do NOT filter aggressively; you'd lose what little you have. Go total metagenomics instead.`,true]);

 // Host depletion when host fraction dominates
 if(S.host>=0.6)
   r.push(["Deplete",`Host reads are ${S.hostT} — most of your sequencing budget would be human. Add host depletion at the bench, and remove host reads in silico.`,false]);

 // Controls when contamination risk is real
 if(S.ct>=0.6)
   r.push(["Controls",`Contamination risk is ${S.ctT} — at this biomass, reagent and kit contaminants can outnumber real signal. Run negative controls, blanks, and replicates. Treat anything you can't reproduce as suspect.`,true]);

 r.push(["Platform", level==="beg"
   ? "Short-read sequencing — best for detection and abundance, and simpler to analyze."
   : "Long-read if you need integration sites or genome structure; otherwise short-read.",false]);

 r.push(["Analysis","Bioinformatics: host-read removal → assembly → viral identification.",false]);

 return draw(S,target,level,r);
}

function draw(S,target,level,r){
 app.innerHTML=`
  <div class="card">
   <div class="prog">${steps.map(()=>`<i class="on"></i>`).join("")}</div>
   <div class="recipe-head"><img src="${IMG}fivi-chef.png" alt="Fivi serving the dish"><div><h2>Fivi's Recipe</h2></div></div>
   <p class="recipe-meta">${S.name} · ${TARGETS[target]} · ${LEVELS[level]} cook</p>
   <ul class="recipe">${r.map(x=>`<li class="${x[2]?'warn':''}"><span class="k">${x[0]}</span><span>${x[1]}</span></li>`).join("")}</ul>
   <p class="foot">Fixed-logic demo, driven by the same estimates as the body heatmap. Soon: Fivi will reason your recipe live via an AI model.</p>
   <div class="nav" style="margin-top:14px"><button class="btn ghost" id="again">↺ Cook again</button><span></span></div>
  </div>`;
 document.getElementById("again").onclick=()=>{step=-1;ans.sample=ans.target=ans.level=null;render();};
}

render();
</script>
</body></html>
