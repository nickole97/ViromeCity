<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fivi's Kitchen — Virome City</title>
<style>
 :root{ --paper:#FBF9F4; --ink:#20201C; --muted:#6E6C63; --line:#E4E1D8; --surface:#FFFFFF; --accent:#0F6E56; --pink:#FBEAF0; --pinkink:#72243E;
   --sans:"Spline Sans",ui-sans-serif,system-ui,sans-serif; --display:"Fraunces",Georgia,serif; --mono:ui-monospace,monospace; }
 @media (prefers-color-scheme: dark){ :root{ --paper:#17181A; --ink:#ECEAE3; --muted:#9B998F; --line:#33342F; --surface:#1F2022; --accent:#3FB08C; --pink:#3A2430; --pinkink:#F3C9D8; } }
 *{box-sizing:border-box}
 body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55;display:flex;justify-content:center;padding:26px 18px;min-height:100vh}
 .doc{width:100%;max-width:580px}
 img{display:block}
 .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);text-align:center;margin:0 0 6px}
 h1{font-family:var(--display);font-weight:600;font-size:34px;margin:0 0 6px;text-align:center;letter-spacing:-.01em}
 .dek{font-size:14px;color:var(--muted);text-align:center;margin:0 auto 20px;max-width:440px}
 .card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:24px 22px;box-shadow:0 3px 14px rgba(0,0,0,.05)}
 /* hero */
 .hero{width:100%;border-radius:20px;border:1px solid var(--line);margin-bottom:16px;box-shadow:0 3px 14px rgba(0,0,0,.06)}
 .btn{font-family:var(--sans);font-size:15px;font-weight:600;padding:13px 26px;border-radius:12px;cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;transition:transform .1s, opacity .15s}
 .btn:hover{opacity:.92}.btn:active{transform:scale(.98)}
 .btn.ghost{background:var(--surface);color:var(--ink);border-color:var(--line)}
 .btn:disabled{opacity:.4;cursor:not-allowed}
 .center{text-align:center}
 /* progress + question */
 .prog{display:flex;gap:6px;margin-bottom:16px}
 .prog i{flex:1;height:5px;border-radius:999px;background:var(--line);transition:background .3s}
 .prog i.on{background:var(--accent)}
 .step-tag{font-family:var(--mono);font-size:11px;color:var(--muted);margin:0 0 4px}
 .q{font-family:var(--display);font-size:21px;font-weight:600;margin:0 0 15px}
 .opts{display:grid;gap:10px;margin-bottom:14px}
 .opt{text-align:left;font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:11px}
 .opt .emoji{font-size:19px}
 .opt:hover{border-color:var(--accent)}
 .opt.sel{border-color:var(--accent);background:rgba(15,110,86,.09);font-weight:600}
 /* Fivi speech bubble */
 .bubble{display:flex;gap:12px;align-items:center;background:var(--pink);border-radius:14px;padding:11px 14px;margin:6px 0 16px;opacity:0;transform:translateY(6px);transition:opacity .25s, transform .25s}
 .bubble.show{opacity:1;transform:none}
 .bubble img{width:52px;height:auto;flex:0 0 auto}
 .bubble p{margin:0;font-size:13.5px;line-height:1.45;color:var(--pinkink)}
 .bubble .name{font-weight:700}
 .nav{display:flex;justify-content:space-between;gap:10px;margin-top:4px}
 /* cooking */
 .cooking{text-align:center;padding:14px 0 18px}
 .cooking img{width:190px;height:auto;margin:0 auto 4px;animation:bob 1.1s ease-in-out infinite}
 @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-7px) rotate(2deg)}}
 .steam{font-size:22px;letter-spacing:6px;animation:pulse 1.3s ease-in-out infinite;color:var(--muted)}
 @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
 .cook-msg{font-family:var(--display);font-size:18px;margin-top:6px}
 /* recipe */
 .recipe-head{display:flex;align-items:center;gap:14px;margin-bottom:4px}
 .recipe-head img{width:86px;height:auto;flex:0 0 auto}
 .recipe-head h2{font-family:var(--display);font-size:24px;margin:0}
 .recipe-meta{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:0 0 14px}
 .recipe{list-style:none;margin:0;padding:0;display:grid;gap:10px}
 .recipe li{display:flex;gap:11px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px}
 .recipe .k{font-family:var(--mono);font-size:10.5px;color:var(--accent);flex:0 0 70px;padding-top:2px;text-transform:uppercase;font-weight:700}
 .recipe li.warn{background:#FFF4E0;border-color:#E4B062}
 .recipe li.warn .k{color:#B77413}
 @media(prefers-color-scheme:dark){.recipe li.warn{background:#3A2E18;border-color:#7A5A22}}
 .foot{margin-top:12px;font-size:11.5px;color:var(--muted);text-align:center;border-top:1px solid var(--line);padding-top:10px}

 .opts.grid2{grid-template-columns:1fr 1fr;gap:9px}
 .opts.grid2 .opt{flex-direction:column;align-items:center;text-align:center;gap:5px;padding:12px 8px}
 .opts.grid2 .opt .emoji{font-size:26px;line-height:1.1}
 .opts.grid2 .opt .nm{font-size:13px;line-height:1.25}
 .opts.grid2 .opt .bm{font-family:var(--mono);font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
 .opt.sel .bm{color:var(--accent)}

 .method{border:1px solid var(--line);border-radius:16px;padding:16px 16px 6px;background:var(--paper);margin:0 0 14px}
 .method-head{display:flex;align-items:baseline;gap:9px;margin:0 0 3px}
 .method-head .tag{font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:var(--accent);border-radius:6px;padding:2px 8px;letter-spacing:.03em}
 .method-head h4{margin:0;font-family:var(--display);font-size:18px;color:var(--ink)}
 .method .msub{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 12px}
 .split-note{display:flex;gap:11px;align-items:center;background:#FFF4E0;border:1px solid #E4B062;border-radius:12px;padding:11px 14px;margin:4px 0 16px}
 .split-note img{width:44px;height:auto;flex:0 0 auto}
 .split-note p{margin:0;font-size:13px;color:#6A4A18;line-height:1.45}
 @media(prefers-color-scheme:dark){.split-note{background:#3A2E18;border-color:#7A5A22}.split-note p{color:#E7CFA0}}
</style></head><body>
<div class="doc" id="app"></div>
<script>
const IMG = "../assets/img/";   // this file lives in docs/kitchen/, images in docs/assets/img/

/* Same estimates as the body heatmap. viralT = viral load, bm = total biomass (drives VLP). */
const SITES={
  gut:{name:"gut / stool",bm:1.0,host:0.05,ct:0.12,bmT:"very high",hostT:"<1%",ctT:"low",viralT:"~1-5%"},
  oral:{name:"oral / saliva",bm:0.85,host:0.2,ct:0.4,bmT:"high",hostT:"5-20%",ctT:"medium",viralT:"~0.1-1%"},
  throat:{name:"upper airway",bm:0.8,host:0.3,ct:0.45,bmT:"high",hostT:"low-med",ctT:"medium",viralT:"~0.1-1%"},
  vaginal:{name:"vaginal tract",bm:0.85,host:0.35,ct:0.35,bmT:"high",hostT:"low-med",ctT:"low-med",viralT:"~1-5%"},
  milk:{name:"breast milk",bm:0.5,host:0.45,ct:0.5,bmT:"medium",hostT:"medium",ctT:"medium",viralT:"~0.1-1%"},
  skin:{name:"skin",bm:0.4,host:0.5,ct:0.72,bmT:"low-med",hostT:"20-50%",ctT:"high",viralT:"~0.1-2%"},
  blood:{name:"blood / plasma",bm:0.1,host:0.9,ct:0.78,bmT:"very low",hostT:"80-95%",ctT:"high",viralT:"<0.1%"},
  urine:{name:"urine",bm:0.12,host:0.6,ct:0.6,bmT:"very low",hostT:"med-high",ctT:"med-high",viralT:"<0.1-0.5%"},
  lung:{name:"lung",bm:0.08,host:0.9,ct:0.92,bmT:"very low",hostT:"very high",ctT:"very high",viralT:"<0.01-0.1%"},
  brain:{name:"brain / CSF",bm:0.05,host:0.88,ct:0.97,bmT:"very low",hostT:"very high",ctT:"very high",viralT:"<0.01%"},
};
const TARGETS={one:"one known virus",free:"bacteriophages",euk:"eukaryotic viruses",all:"the whole virome"};
const GENOMES={dna:"DNA only",both:"DNA + RNA"};

const STEP_SAMPLE={ key:"sample", q:"What's in your basket? (the sample)", grid:true,
  opts:[["gut","🧫","Gut / stool","~1-5% viral"],
        ["vaginal","🌸","Vaginal tract","~1-5% viral"],
        ["skin","🧴","Skin swab","~0.1-2% viral"],
        ["oral","👄","Oral / saliva","~0.1-1% viral"],
        ["throat","🗣️","Upper airway","~0.1-1% viral"],
        ["milk","🍼","Breast milk","~0.1-1% viral"],
        ["urine","💧","Urine","<0.1-0.5% viral"],
        ["blood","🩸","Blood / plasma","<0.1% viral"],
        ["lung","🫁","Lung","<0.01-0.1% viral"],
        ["brain","🧠","Brain / CSF","<0.01% viral"]],
  react:{gut:["fivi-happy","Stool — my favourite pantry! Packed with phages, and viruses are actually findable here."],
         vaginal:["fivi-happy","Vaginal tract — decent viral load and clean-ish. A friendly dish."],
         skin:["fivi-nervous","Skin — sparse pickings and contamination everywhere. Clean controls will matter."],
         oral:["fivi-happy","Saliva — busy and bacteria-rich. Plenty to work with."],
         throat:["fivi-thinking","Upper airway — lots of biomass, but the virus still hides behind the bacteria."],
         milk:["fivi-thinking","Milk — middling biomass. We'll need a gentle hand."],
         urine:["fivi-nervous","Urine — thin soup. Barely anything to work with."],
         blood:["fivi-nervous","Blood… very low biomass and almost all host. We'll cook very gently."],
         lung:["fivi-nervous","Lung — very low biomass and heavy contamination risk. Careful."],
         brain:["fivi-surprised","Brain / CSF?! The hardest kitchen there is — nearly no biomass, huge contamination risk."]} };

const STEP_TARGET={ key:"target", q:"What are we cooking for? (the target)",
  opts:[["one","🎯","One known virus — is it there or not?"],
        ["free","🦠","Bacteriophages"],
        ["euk","🧬","Eukaryotic (human) viruses"],
        ["all","🌍","Everything (total virome)"]],
  react:{one:["fivi-surprised","Just one virus, present or absent? Then don't cook the whole banquet — PCR is far cheaper, and more sensitive."],
         free:["fivi-happy","Phages! Now — are you after the free ones floating around, the ones integrated into bacterial genomes, or both? That changes everything."],
         euk:["fivi-thinking","Careful here. Much of the eukaryotic virome isn't a free particle at all — I'll flag what that costs you."],
         all:["fivi-surprised","Everything?! Ambitious — and that's two dishes, not one. I'll show you why."]} };

const STEP_STATE={ key:"state", q:"Are you interested in integrated prophages?",
  opts:[["pro","🧬","Yes — actually I'm just looking for those"],
        ["free","🦠","No — I just want the free virions"],
        ["both","🔀","Both: integrated prophages and free virions"]],
  react:{pro:["fivi-thinking","Just the prophages — genomes tucked into bacterial chromosomes. No VLP for these; they'd be filtered right out."],
         free:["fivi-happy","Free virions only — then VLP prep is the whole game."],
         both:["fivi-surprised","Both?! Free and integrated live in different fractions — that means two separate methods, not one. I'll lay out each."]} };

const STEP_GENOME={ key:"genome", q:"What kind of genome are we after?",
  opts:[["dna","🧬","Just DNA"],["both","🧫","DNA and RNA"]],
  react:{dna:["fivi-happy","DNA only — most phages are dsDNA, so we can skip reverse transcription and save a step."],
         both:["fivi-surprised","Good call — RNA phages are real (Fiersviridae, Cystoviridae) and most surveys quietly miss them. We'll add reverse transcription."]} };

/* The genome question only appears if you're after free particles. */
function steps(){
  const s=[STEP_SAMPLE, STEP_TARGET];
  if(ans.target==="free"){
    s.push(STEP_STATE);
    if(ans.state==="free" || ans.state==="both") s.push(STEP_GENOME);  // genome only matters where free virions are in play
  }
  return s;
}

const cookSteps=[
  ["fivi-chopping","Fivi is chopping the metadata…"],
  ["fivi-seasoning","Seasoning the protocol…"],
  ["fivi-baking","Almost out of the oven…"],
];
let step=-1;
const ans={sample:null,target:null,state:null,genome:null};
const app=document.getElementById("app");

function render(){
 const S=steps();
 if(step===-1) return intro();
 if(step<S.length) return question();
 if(step===S.length) return cooking();
 return recipe();
}
function intro(){
 app.innerHTML=`
  <img class="hero" src="${IMG}fivi-kitchen-hero.png" alt="Fivi the bacteriophage cooking in her kitchen">
  <p class="eyebrow">Virome City</p>
  <h1>Fivi's Kitchen</h1>
  <p class="dek">Tell me about your sample and I'll cook you a virome recipe — the methods, in the right order, for your exact case.</p>
  <div class="center"><button class="btn" id="start">Start cooking →</button></div>`;
 document.getElementById("start").onclick=()=>{step=0;render();};
}
function question(){
 const S=steps(); const c=S[step]; const chosen=ans[c.key]; const rc=chosen?c.react[chosen]:null;
 app.innerHTML=`
  <div class="card">
   <div class="prog">${S.map((_,i)=>`<i class="${i<=step?'on':''}"></i>`).join("")}</div>
   <p class="step-tag">Ingredient ${step+1} of ${S.length}</p>
   <p class="q">${c.q}</p>
   <div class="opts${c.grid?' grid2':''}">${c.opts.map(o=>c.grid
      ? `<button class="opt ${chosen===o[0]?'sel':''}" data-v="${o[0]}"><span class="emoji">${o[1]}</span><span class="nm">${o[2]}</span><span class="bm">${o[3]}</span></button>`
      : `<button class="opt ${chosen===o[0]?'sel':''}" data-v="${o[0]}"><span class="emoji">${o[1]}</span>${o[2]}</button>`).join("")}</div>
   <div class="bubble ${chosen?'show':''}" id="bubble">
     <img id="bav" src="${IMG}${rc?rc[0]:'fivi-thinking'}.png" alt="Fivi">
     <p><span class="name">Fivi:</span> <span id="btext">${rc?rc[1]:''}</span></p>
   </div>
   <div class="nav">
     <button class="btn ghost" id="back">← Back</button>
     <button class="btn" id="next" ${chosen?'':'disabled'}>${step===S.length-1?'Cook it! 🍳':'Next →'}</button>
   </div>
  </div>`;
 app.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
   const v=b.dataset.v;
   if(c.key==="target" && ans.target!==v){ ans.state=null; ans.genome=null; }
   if(c.key==="state" && ans.state!==v){ ans.genome=null; }
   ans[c.key]=v;
   const r=c.react[v];
   document.getElementById("btext").textContent=r[1];
   document.getElementById("bav").src=IMG+r[0]+".png";
   document.getElementById("bubble").classList.add("show");
   app.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel")); b.classList.add("sel");
   document.getElementById("next").disabled=false;
 });
 document.getElementById("back").onclick=()=>{step--;render();};
 document.getElementById("next").onclick=()=>{step++;render();};
}
function cooking(){
 let i=0;
 const draw=()=>{ app.innerHTML=`
    <div class="card cooking">
     <img src="${IMG}${cookSteps[i][0]}.png" alt="Fivi cooking">
     <div class="steam">≈ ≈ ≈</div>
     <p class="cook-msg">${cookSteps[i][1]}</p>
    </div>`; };
 draw();
 const iv=setInterval(()=>{ i++; if(i<cookSteps.length) draw(); },900);
 // NOTE: this fixed delay is where the AI API call will go later.
 setTimeout(()=>{ clearInterval(iv); step++; render(); }, 2700);
}

function recipe(){
 const {sample,target,genome}=ans;
 const S=SITES[sample];
 const r=[];

 /* ---- Targeted branch: you already know what you're looking for ---- */
 if(target==="one"){
   r.push(["Skip it","You don't need metagenomics. Sequencing everything to find one known virus is the expensive way to answer a cheap question.",false]);
   r.push(["Method","<b>qPCR</b> — or <b>RT-qPCR</b> if your virus has an RNA genome. Orders of magnitude cheaper than shotgun, and far more sensitive for a known target. If you need <i>absolute</i> quantification at low copy number rather than a yes/no, reach for <b>ddPCR</b> instead.",false]);
   r.push(["Catch","This only works if you already have the sequence and validated primers — and a strain that diverges at the primer site will read as a false negative. If discovery matters, you're back to metagenomics.",true]);
   if(S.ct>=0.6)
     r.push(["Controls",`Contamination risk here is ${S.ctT}, and PCR is sensitive enough to amplify a contaminant into a confident false positive. Run no-template controls, extraction blanks, and a positive control every time.`,true]);
   else
     r.push(["Controls","Run no-template controls, extraction blanks, and a positive control. PCR is sensitive enough that a contaminant reads as a real hit.",false]);
   r.push(["Extraction",`Viral load here is ${S.viralT} and biomass is ${S.bmT} — that shapes your extraction and input volume, even though you're skipping VLP prep entirely (PCR is already specific; filtering would only lose you material).`,false]);
   r.push(["If you need more","Want the strain, or many known viruses at once? A targeted capture panel or amplicon sequencing sits between PCR and full shotgun — cheaper than metagenomics, richer than a Ct value.",false]);
   return draw(S,r);
 }

 /* ---- Discovery branches ---- */

 // helpers shared by phage sub-cases
 const rtLine = (genome==="both")
   ? ["Convert","Add reverse transcription (RT). RNA phages exist — Fiersviridae, Cystoviridae — and a DNA-only protocol is blind to every one of them.",false]
   : ["Convert","DNA only — most phages are dsDNA, so no RT needed. Just know what you're trading away: any RNA phage here is invisible to you.",false];
 const filterLine = (S.bm>=0.4)
   ? ["Filter",`Biomass is ${S.bmT} — keep the <b>0.22 µm filter</b>. There are plenty of bacteria to remove, and removing them is what lifts your ${S.viralT} viral fraction into something worth sequencing.`,false]
   : ["Filter",`Biomass is ${S.bmT} — <b>drop the 0.22 µm filter</b> (barely any bacteria to remove, and it would cost you virions you can't spare). Clarify gently, concentrate, and keep the nuclease. Still VLP — just without filtration.`,true];

 // === BACTERIOPHAGES: state decides the whole method ===
 if(target==="free"){

   // (1) integrated prophages only -> bulk metagenomics, no VLP
   if(ans.state==="pro"){
     r.push(["Base","Bulk (total) metagenomics — sequence the whole community. Prophages live inside bacterial genomes, so they come along with the bacterial DNA.",false]);
     r.push(["No VLP","Do NOT do VLP. The filter and nuclease exist to isolate free capsids — they'd throw away the integrated prophages you're actually after.",true]);
     r.push(["Convert","DNA workflow — prophages are DNA in the host chromosome. No RT needed.",false]);
     if(S.host>=0.6) r.push(["Deplete",`Host reads are ${S.hostT} — but careful: aggressive host depletion can strip the very bacteria your prophages are sitting in. Deplete lightly, or not at all, and remove host reads in silico instead.`,true]);
     r.push(["Analysis","Bioinformatics: assemble the community, then hunt prophages inside bacterial contigs (integrated-element / prophage prediction tools).",false]);
     r.push(["Platform","<b>Long-read</b> shines here — spanning the phage–host junction proves the prophage is genuinely integrated and shows where. Short-read finds them too, but the integration site is harder to pin down.",false]);
     return draw(S,r);
   }

   // (2) free virions only -> VLP is mandatory
   if(ans.state==="free"){
     r.push(["Base","Shotgun metagenomics on a VLP-enriched library.",false]);
     r.push(rtLine);
     r.push(["Enrich · VLP","Free virions only — so VLP prep isn't optional, it's the whole point. The <b>nuclease</b> does the real work: it digests every genome not sealed inside a capsid, turning a viral needle into a viral signal.",false]);
     r.push(filterLine);
     if(S.host>=0.6) r.push(["Deplete",`Host reads are ${S.hostT} — add host depletion at the bench and remove host reads in silico.`,false]);
     if(S.ct>=0.6) r.push(["Controls",`Contamination risk is ${S.ctT} — reagent and kit contaminants can outnumber real signal at this biomass. Run negative controls, blanks and replicates.`,true]);
     r.push(["Platform","<b>Short-read</b> for what's there and how much; <b>long-read</b> for whole phage genomes and structure. Many run short-read first, then long-read to finish genomes.",false]);
     r.push(["Analysis","Bioinformatics: host-read removal → assembly → viral identification.",false]);
     return draw(S,r);
   }

   // (3) both -> TWO separate methods, shown as a tree
   if(ans.state==="both"){
     const methodA=[
       ["Base","Bulk (total) metagenomics — sequence the whole community. Prophages live inside bacterial genomes, so they come along with the bacterial DNA; there's nothing to enrich for separately.",false],
       ["No VLP","Do NOT do VLP on this arm. The 0.22 µm filter and the nuclease exist to isolate free capsids — they would discard the integrated prophages you're after here.",true],
       ["Convert","DNA workflow, no reverse transcription — a prophage is DNA sitting in the host chromosome.",false],
       (S.host>=0.6?["Deplete",`Host reads are ${S.hostT}, so it's tempting to deplete — but be careful: aggressive host depletion strips the very bacteria your prophages are integrated into. Deplete lightly, or skip it at the bench and remove host reads in silico instead.`,true]:null),
       ["Platform","<b>Long-read</b> earns its place here: a read that spans the phage–host junction is what proves the prophage is genuinely integrated, and shows exactly where. Short-read detects them too, but pinning down the integration site is much harder.",false],
       ["Analysis","Assemble the community, then predict prophages inside bacterial contigs (integrated-element / prophage-finding tools).",false],
     ].filter(Boolean);
     const methodB=[
       ["Base","Shotgun metagenomics on a VLP-enriched library — this arm goes after the free particles.",false],
       rtLine,
       ["Enrich · VLP","VLP prep is the whole point of this arm. The <b>nuclease</b> does the real work: it digests every genome that isn't sealed inside a capsid, turning a viral needle into a viral signal.",false],
       filterLine,
       (S.host>=0.6?["Deplete",`Host reads are ${S.hostT} — add host depletion at the bench and remove host reads in silico.`,false]:null),
       (S.ct>=0.6?["Controls",`Contamination risk is ${S.ctT} — reagent and kit contaminants can outnumber real signal at this biomass. Run negative controls, blanks and replicates on this arm especially.`,true]:null),
       ["Platform","<b>Short-read</b> for what's there and how much; <b>long-read</b> to finish whole phage genomes and resolve structure. Many run short-read first, then long-read once they know what's in there.",false],
       ["Analysis","Bioinformatics: host-read removal → assembly → viral identification.",false],
     ].filter(Boolean);
     return drawSplit(S, methodA, methodB,
       "Free and integrated phages sit in different physical fractions, and no single prep captures both. So you split the sample and run these two methods in parallel, sequenced as two libraries — roughly twice the work and budget, but the only honest way to see both.",
       (S.bm<0.4 ? `One caution: biomass here is ${S.bmT}. Splitting an already thin sample between two preps may leave neither arm with enough — bring more input material if you can, or run one arm and say which, and why, in your methods.` : ""));
   }
 }

 
 // === eukaryotic viruses & everything: push their specifics, then fall through to the shared tail ===
 if(target==="euk" || target==="all")
   r.push(["Base","Shotgun metagenomics — sequence everything, then sort out what's viral afterwards.",false]);

 if(target==="euk"){
   r.push(["Convert","Add reverse transcription (RT) so RNA-genome viruses are captured, not just DNA ones.",false]);
   r.push(["Enrich","VLP prep only captures encapsidated free particles — and much of the eukaryotic virome isn't one. Integrated proviruses and ERVs, latent herpes episomes, and virus caught mid-replication inside a cell are all washed out by the filter and digested by the nuclease. Use VLP only if free virions are genuinely all you want; otherwise go total metagenomics.",true]);
   if(S.bm<0.4)
     r.push(["Enrich (biomass)",`Biomass here is ${S.bmT} anyway — filtering would cost you material you can't spare. Total metagenomics is the call.`,true]);
 }

 if(target==="all"){
   r.push(["Convert","Add reverse transcription (RT) so RNA-genome viruses are captured, not just DNA ones.",false]);
   r.push(["The catch","No single prep gives you everything. VLP is a free-particle filter <i>by design</i>: it's the only way to lift free virions out from under the bacteria in useful amounts — but that same filter and nuclease destroy what you need from the eukaryotic side (proviruses, ERVs, latent episomes, virus caught mid-replication inside a cell). Skip VLP and you keep those, but your free virions drown in host and bacterial reads.",true]);
   r.push(["Two preps",`So do both. Split the sample and run <b>two preps in parallel</b>, sequenced as two libraries: <b>(1)</b> a <b>VLP arm</b> for the free virions — ${S.bm>=0.4 ? "full prep, 0.22 µm filter included" : "no 0.22 µm filter at "+S.bmT+" biomass, but keep the nuclease"} — and <b>(2)</b> an <b>unfiltered total-metagenomics arm</b>, no nuclease, for the integrated and intracellular fraction. Two datasets, one honest picture — and yes, roughly twice the budget.`,true]);
   if(S.bm<0.4)
     r.push(["Two preps · biomass",`The real constraint here isn't the filter, it's the splitting: biomass is ${S.bmT}, and halving an already thin sample may leave neither arm with enough. Bring more input material if you can — or run one arm and say which, and why, in your methods.`,true]);
 }

 if(S.host>=0.6)
   r.push(["Deplete",`Host reads are ${S.hostT} — most of your sequencing budget would be human. Add host depletion at the bench, and remove host reads in silico.`,false]);

 if(S.ct>=0.6)
   r.push(["Controls",`Contamination risk is ${S.ctT} — at this biomass, reagent and kit contaminants can outnumber real signal. Run negative controls, blanks, and replicates. Treat anything you can't reproduce as suspect.`,true]);

 r.push(["Platform","What you need decides this, not how experienced you are. <b>Short-read</b> if the question is what's there and how much — cheaper, deeper, and the pipelines are well trodden. <b>Long-read</b> if you need whole genomes, strain resolution, or integration sites — you'll pay in depth and error rate. Plenty of people run short-read first and add long-read once they know what's in there.",false]);

 r.push(["Analysis","Bioinformatics: host-read removal → assembly → viral identification.",false]);

 return draw(S,r);
}

function methodBlock(tag, title, sub, rows){
  return `<div class="method">
    <div class="method-head"><span class="tag">${tag}</span><h4>${title}</h4></div>
    <p class="msub">${sub}</p>
    <ul class="recipe">${rows.map(x=>`<li class="${x[2]?'warn':''}"><span class="k">${x[0]}</span><span>${x[1]}</span></li>`).join("")}</ul>
  </div>`;
}
function drawSplit(S, A, B, note, note2){
  const meta=[S.name, TARGETS[ans.target], "free + integrated"].filter(Boolean).join(" · ");
  app.innerHTML=`
   <div class="card">
    <div class="prog">${steps().map(()=>`<i class="on"></i>`).join("")}</div>
    <div class="recipe-head"><img src="${IMG}fivi-chef.png" alt="Fivi serving the dish"><div><h2>Fivi's Recipe</h2></div></div>
    <p class="recipe-meta">${meta}</p>
    <div class="split-note"><img src="${IMG}fivi-surprised.png" alt="Fivi"><p>${note}${note2?" "+note2:""}</p></div>
    ${methodBlock("Method A","Integrated prophages","bulk metagenomics · no VLP", A)}
    ${methodBlock("Method B","Free virions","VLP-enriched library", B)}
    <p class="foot">Two libraries, one honest picture. Fixed-logic demo, driven by the same estimates as the body heatmap.</p>
    <div class="nav" style="margin-top:14px"><button class="btn ghost" id="again">↺ Cook again</button><span></span></div>
   </div>`;
  document.getElementById("again").onclick=()=>{step=-1;ans.sample=ans.target=ans.state=ans.genome=null;render();};
}

function draw(S,r){
 const meta=[S.name, TARGETS[ans.target], ans.genome?GENOMES[ans.genome]:null].filter(Boolean).join(" · ");
 app.innerHTML=`
  <div class="card">
   <div class="prog">${steps().map(()=>`<i class="on"></i>`).join("")}</div>
   <div class="recipe-head"><img src="${IMG}fivi-chef.png" alt="Fivi serving the dish"><div><h2>Fivi's Recipe</h2></div></div>
   <p class="recipe-meta">${meta}</p>
   <ul class="recipe">${r.map(x=>`<li class="${x[2]?'warn':''}"><span class="k">${x[0]}</span><span>${x[1]}</span></li>`).join("")}</ul>
   <p class="foot">Fixed-logic demo, driven by the same estimates as the body heatmap. Soon: Fivi will reason your recipe live via an AI model.</p>
   <div class="nav" style="margin-top:14px"><button class="btn ghost" id="again">↺ Cook again</button><span></span></div>
  </div>`;
 document.getElementById("again").onclick=()=>{step=-1;ans.sample=ans.target=ans.state=ans.genome=null;render();};
}
render();
</script>
